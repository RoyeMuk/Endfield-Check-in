name: Auto Sign

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动运行
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0点（北京时间8点）自动运行

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run auto sign
        env:
          TOKEN: ${{ secrets.TOKEN }}
          EXIT_WHEN_FAIL: ${{ vars.EXIT_WHEN_FAIL }}
          SC3_SENDKEY: ${{ secrets.SC3_SENDKEY }}
          SC3_UID: ${{ secrets.SC3_UID }}
        run: python main.py
