name: Keep Repository Alive

on:
  schedule:
    # 非整点随机时间（每周一 2:37 UTC → 北京时间 10:37）
    - cron: '37 2 * * 1'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # 防止并发重复运行
    concurrency:
      group: keep-alive
      cancel-in-progress: true

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置Git提交身份
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 更新时间戳文件
        run: |
          echo "仓库最后保活时间: $(date +"%Y-%m-%d %H:%M:%S") 北京时间" > keep-alive.log

      - name: 提交并推送修改
        run: |
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 自动保活 - $(date +'%Y-%m-%d')" && git push)
